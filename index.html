<!DOCTYPE html>
<html>
<head>
    <title>Dodge The Blocks</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>

<h1>Dodge The Blocks</h1>

<p id="score">Score: 0</p>
<p id="coins">Coins: 0</p>

<h2>Shop</h2>

<button onclick="buySkin('player2.png',0)">
Default Skin (Free)
</button>

<button onclick="buySkin('player3.png',20)">
Pyro Skin (20 coins)
</button>

<button onclick="buySkin('player1.png',40)">
Ninja Skin (40 coins)
</button>

<audio id="coinSound" src="assets/coin.wav"></audio>
<audio id="hitSound" src="assets/hit.wav"></audio>
<audio id="music" src="assets/music.mp3" loop></audio>
<canvas id="gameCanvas" width="400" height="600"></canvas>

<div id="gameOverScreen" class="hidden">
    <h2>Game Over</h2>
    <p id="finalScore"></p>
    <button onclick="restartGame()">Play Again</button>
</div>

<script src="script.js"></script>
</body>
</html>
